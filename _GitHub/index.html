<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lagerverwaltung FB300</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1d1d1f;
    }

    /* ── Header ── */
    header {
      background: #1c3f6e;
      color: #fff;
      padding: 14px 16px 10px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    header h1 { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    #updated  { font-size: 11px; opacity: .65; margin-top: 2px; }

    /* ── Suche ── */
    .search-bar {
      background: #fff;
      padding: 10px 12px;
      position: sticky;
      top: 54px;
      z-index: 199;
      border-bottom: 1px solid #dde1e7;
    }
    .search-bar input {
      width: 100%;
      padding: 9px 14px;
      border: 1.5px solid #c5cad3;
      border-radius: 10px;
      font-size: 16px;   /* verhindert Auto-Zoom auf iOS */
      outline: none;
      background: #f7f8fa;
      transition: border-color .15s;
    }
    .search-bar input:focus { border-color: #1c3f6e; background: #fff; }

    /* ── Filter-Chips ── */
    .chips {
      display: flex;
      gap: 7px;
      padding: 8px 12px;
      overflow-x: auto;
      background: #fff;
      border-bottom: 1px solid #dde1e7;
      -webkit-overflow-scrolling: touch;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid #c5cad3;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s, color .12s;
    }
    .chip.active { background: #1c3f6e; color: #fff; border-color: #1c3f6e; }

    /* ── Ergebnis-Info ── */
    #info {
      padding: 7px 14px;
      font-size: 12px;
      color: #6e7480;
    }

    /* ── Karten ── */
    #results { padding: 4px 12px 80px; }

    .card {
      background: #fff;
      border-radius: 13px;
      padding: 13px 14px;
      margin-bottom: 9px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .art-nr    { font-size: 12px; color: #8a909c; font-family: 'SF Mono', monospace; }
    .art-name  { font-size: 15px; font-weight: 600; margin-top: 2px; line-height: 1.3; }
    .bestand   { font-size: 16px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .bestand.ok  { color: #1e8c45; }
    .bestand.low { color: #c0392b; }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }
    .tag {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 10px;
      background: #eef1f6;
      color: #4a5268;
    }
    .tag.ort   { background: #e4f4e8; color: #256535; }
    .tag.ean   { background: #fdf3e3; color: #7a5200; font-family: monospace; }
    .tag.preis { background: #f0f0f0; color: #333; }

    /* ── Leer- und Lade-Zustände ── */
    .hint {
      text-align: center;
      padding: 48px 20px;
      color: #8a909c;
      font-size: 15px;
      line-height: 1.6;
    }
    .hint .icon { font-size: 36px; display: block; margin-bottom: 10px; }
    .hint.error { color: #c0392b; }
  </style>
</head>
<body>

<header>
  <h1>📦 Lagerverwaltung FB300</h1>
  <div id="updated">Lade Daten …</div>
</header>

<div class="search-bar">
  <input type="search" id="q"
         placeholder="Artikel, Art.-Nr., EAN, Lagerort …"
         autocomplete="off" autocorrect="off" autocapitalize="off">
</div>

<div class="chips" id="chips">
  <button class="chip active" data-group="">Alle</button>
</div>

<div id="info"></div>
<div id="results">
  <div class="hint"><span class="icon">⏳</span>Lagerdaten werden geladen …</div>
</div>


<script>
  let data        = [];
  let activeGroup = '';

  /* ── Daten laden ── */
  async function load() {
    try {
      const r = await fetch('./lager.json?v=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      data = await r.json();

      // Warengruppen-Chips
      const groups = [...new Set(data.map(d => d.warengruppe).filter(Boolean))].sort();
      const bar = document.getElementById('chips');
      groups.forEach(g => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.dataset.group = g;
        btn.textContent = g;
        bar.appendChild(btn);
      });

      document.getElementById('updated').textContent =
        'Stand: ' + new Date().toLocaleString('de-DE', {dateStyle:'short', timeStyle:'short'});

      render();
    } catch (e) {
      document.getElementById('results').innerHTML =
        `<div class="hint error"><span class="icon">⚠️</span>
         Daten konnten nicht geladen werden.<br><small>${e.message}</small></div>`;
    }
  }

  /* ── Anzeige rendern ── */
  function render() {
    const q = document.getElementById('q').value.trim().toLowerCase();

    const filtered = data.filter(d => {
      if (activeGroup && d.warengruppe !== activeGroup) return false;
      if (!q) return true;
      return ['artnr','artikel','ean','lagerort','attribut','warengruppe']
        .some(k => (d[k] || '').toLowerCase().includes(q));
    });

    const info = document.getElementById('info');
    info.textContent = filtered.length + ' Artikel' + (q ? ` für „${q}"` : '');

    const box = document.getElementById('results');
    if (filtered.length === 0) {
      box.innerHTML = `<div class="hint"><span class="icon">🔍</span>Keine Artikel gefunden.</div>`;
      return;
    }

    box.innerHTML = filtered.map(d => {
      const b   = parseFloat(d.bestand) || 0;
      const cls = b <= 0 ? 'low' : 'ok';
      const vk  = d.vk ? parseFloat(d.vk).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}) : '';
      return `
        <div class="card">
          <div class="card-top">
            <div>
              <div class="art-nr">${x(d.artnr)}</div>
              <div class="art-name">${x(d.artikel)}</div>
            </div>
            <div class="bestand ${cls}">${x(d.bestand)}&thinsp;${x(d.einheit)}</div>
          </div>
          <div class="tags">
            ${d.lagerort    ? `<span class="tag ort">📍 ${x(d.lagerort)}</span>`       : ''}
            ${d.ean         ? `<span class="tag ean">EAN ${x(d.ean)}</span>`           : ''}
            ${d.warengruppe ? `<span class="tag">${x(d.warengruppe)}</span>`           : ''}
            ${d.attribut    ? `<span class="tag">${x(d.attribut)}</span>`              : ''}
            ${vk            ? `<span class="tag preis">VK ${vk} €</span>`             : ''}
          </div>
        </div>`;
    }).join('');
  }

  /* ── HTML escapen ── */
  function x(s) {
    return (s ?? '').toString()
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Events ── */
  document.getElementById('q').addEventListener('input', render);

  document.getElementById('chips').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeGroup = chip.dataset.group;
    render();
  });

  load();
</script>

</body>
</html>
