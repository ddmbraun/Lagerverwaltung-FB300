<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lagerverwaltung FB300</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1d1d1f; }

    header { background: #1c3f6e; color: #fff; padding: 14px 16px 10px; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 6px rgba(0,0,0,.25); }
    header h1 { font-size: 17px; font-weight: 700; }
    #updated { font-size: 11px; opacity: .65; margin-top: 2px; }

    .search-bar { background: #fff; padding: 10px 12px; position: sticky; top: 54px; z-index: 199; border-bottom: 1px solid #dde1e7; display: flex; gap: 8px; align-items: center; }
    .search-bar input { flex: 1; padding: 9px 14px; border: 1.5px solid #c5cad3; border-radius: 10px; font-size: 16px; outline: none; background: #f7f8fa; }
    .search-bar input:focus { border-color: #1c3f6e; background: #fff; }
    #scan-btn { flex-shrink: 0; width: 42px; height: 42px; background: #1c3f6e; color: #fff; border: none; border-radius: 10px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* Scanner */
    #scanner-overlay { display: none; position: fixed; inset: 0; z-index: 999; background: #000; flex-direction: column; align-items: center; justify-content: center; }
    #scanner-overlay.active { display: flex; }
    #scanner-video { width: 100%; max-width: 480px; border-radius: 12px; }
    #scan-close { margin-top: 20px; padding: 12px 32px; background: #fff; color: #1c3f6e; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    #scan-hint { color: #fff; font-size: 14px; margin-top: 12px; opacity: .8; text-align: center; }

    /* Detail */
    #detail-overlay { display: none; position: fixed; inset: 0; z-index: 998; background: rgba(0,0,0,0.5); align-items: flex-end; }
    #detail-overlay.active { display: flex; }
    #detail-box { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding: 20px 16px 40px; max-height: 85vh; overflow-y: auto; }
    #detail-close { float: right; background: #eee; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; line-height: 30px; text-align: center; }
    #detail-title { font-size: 18px; font-weight: 700; margin: 8px 0 16px; line-height: 1.3; clear: both; }
    .detail-bestand { font-size: 28px; font-weight: 700; text-align: center; padding: 12px 0 20px; }
    .detail-bestand.ok { color: #1e8c45; }
    .detail-bestand.low { color: #c0392b; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #888; }
    .detail-value { font-weight: 500; text-align: right; max-width: 65%; word-break: break-all; }

    /* Filter */
    .chips { display: flex; gap: 7px; padding: 8px 12px; overflow-x: auto; background: #fff; border-bottom: 1px solid #dde1e7; -webkit-overflow-scrolling: touch; }
    .chips::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; padding: 5px 13px; border-radius: 20px; border: 1.5px solid #c5cad3; background: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .chip.active { background: #1c3f6e; color: #fff; border-color: #1c3f6e; }

    #info { padding: 7px 14px; font-size: 12px; color: #6e7480; }
    #results { padding: 4px 12px 80px; }

    .card { background: #fff; border-radius: 13px; padding: 13px 14px; margin-bottom: 9px; box-shadow: 0 1px 4px rgba(0,0,0,.07); cursor: pointer; }
    .card:active { background: #f5f7fb; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .art-nr { font-size: 12px; color: #8a909c; font-family: monospace; }
    .art-name { font-size: 15px; font-weight: 600; margin-top: 2px; line-height: 1.3; }
    .bestand { font-size: 16px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .bestand.ok { color: #1e8c45; }
    .bestand.low { color: #c0392b; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: #eef1f6; color: #4a5268; }
    .tag.ort { background: #e4f4e8; color: #256535; }
    .tag.ean { background: #fdf3e3; color: #7a5200; font-family: monospace; font-size: 10px; }

    .hint { text-align: center; padding: 48px 20px; color: #8a909c; font-size: 15px; }
    .hint .icon { font-size: 36px; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <h1>📦 Lagerverwaltung FB300</h1>
  <div id="updated">Lade Daten …</div>
</header>

<div class="search-bar">
  <input type="search" id="q" placeholder="Artikel, Art.-Nr., EAN …"
         autocomplete="off" autocorrect="off" autocapitalize="off">
  <button id="scan-btn" title="Barcode scannen">📷</button>
</div>

<div class="chips" id="chips">
  <button class="chip active" data-group="">Alle</button>
</div>

<div id="info"></div>
<div id="results">
  <div class="hint"><span class="icon">⏳</span>Lagerdaten werden geladen …</div>
</div>

<!-- Scanner -->
<div id="scanner-overlay">
  <video id="scanner-video" autoplay playsinline muted></video>
  <div id="scan-hint">Halte den Barcode vor die Kamera</div>
  <button id="scan-close">✕ Schließen</button>
</div>

<!-- Detail -->
<div id="detail-overlay">
  <div id="detail-box">
    <button id="detail-close">✕</button>
    <div id="detail-title"></div>
    <div id="detail-content"></div>
  </div>
</div>

<script>
let zxingLoaded = false;
async function loadZXing() {
  if (zxingLoaded) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.4/umd/index.min.js';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  zxingLoaded = true;
}
let data        = [];
let activeGroup = '';
let codeReader  = null;

async function load() {
  try {
    const r = await fetch('./lager.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const raw = await r.json();

    // Überschriften-Zeile herausfiltern
    data = raw.filter(d => d.artnr && d.artnr !== 'Art.-Nr.' && d.nr !== '#');

    const groups = [...new Set(data.map(d => d.warengruppe).filter(Boolean))].sort();
    const bar = document.getElementById('chips');
    groups.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'chip'; btn.dataset.group = g; btn.textContent = g;
      bar.appendChild(btn);
    });

    document.getElementById('updated').textContent =
      'Stand: ' + new Date().toLocaleString('de-DE', {dateStyle:'short', timeStyle:'short'});
    render();
  } catch(e) {
    document.getElementById('results').innerHTML =
      `<div class="hint" style="color:#c0392b"><span class="icon">⚠️</span>Fehler: ${e.message}</div>`;
  }
}

function render() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const filtered = data.filter(d => {
    if (activeGroup && d.warengruppe !== activeGroup) return false;
    if (!q) return true;
    return ['artnr','artikel','ean','lagerort','attribut','warengruppe','nr']
      .some(k => (d[k] || '').toLowerCase().includes(q));
  });

  document.getElementById('info').textContent =
    filtered.length + ' Artikel' + (q ? ` für „${q}"` : '');

  const box = document.getElementById('results');
  if (!filtered.length) {
    box.innerHTML = `<div class="hint"><span class="icon">🔍</span>Keine Artikel gefunden.</div>`;
    return;
  }

  box.innerHTML = filtered.map(d => {
    const b   = parseFloat((d.bestand||'0').replace(',','.')) || 0;
    const cls = b <= 0 ? 'low' : 'ok';
    const idx = data.indexOf(d);
    return `
      <div class="card" onclick="showDetail(${idx})">
        <div class="card-top">
          <div>
            <div class="art-nr">${x(d.artnr)}</div>
            <div class="art-name">${x(d.artikel)}</div>
          </div>
          <div class="bestand ${cls}">${x(d.bestand)}&thinsp;${x(d.einheit)}</div>
        </div>
        <div class="tags">
          ${d.lagerort    ? `<span class="tag ort">📍 ${x(d.lagerort)}</span>` : ''}
          ${d.warengruppe ? `<span class="tag">${x(d.warengruppe)}</span>` : ''}
          ${d.ek          ? `<span class="tag" style="background:#eef6ff;color:#1c3f6e">EK ${x(d.ek)} €</span>` : ''}
          ${d.ean         ? `<span class="tag ean">EAN ${x(d.ean)}</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

function showDetail(idx) {
  const d = data[idx];
  if (!d) return;
  const b   = parseFloat((d.bestand||'0').replace(',','.')) || 0;
  const cls = b <= 0 ? 'low' : 'ok';
  const fmtNum = s => {
    const n = parseFloat((s||'').replace(',','.'));
    return isNaN(n) ? s : n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
  };

  document.getElementById('detail-title').textContent = d.artikel || '';
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-bestand ${cls}">${x(d.bestand)} ${x(d.einheit)}</div>
    ${row('Art.-Nr.',    d.artnr)}
    ${row('EAN',         d.ean)}
    ${row('Lagerort',    d.lagerort)}
    ${row('Warengruppe', d.warengruppe)}
    ${row('Attribut',    d.attribut)}
    ${row('VK-Preis',    d.vk ? fmtNum(d.vk) + ' €' : '')}
    ${row('EK-Preis',    d.ek ? fmtNum(d.ek) + ' €' : '')}
    ${row('Nr.',         d.nr)}
  `;
  document.getElementById('detail-overlay').classList.add('active');
}

function row(label, val) {
  if (!val) return '';
  return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${x(val)}</span></div>`;
}

/* ── Barcode Scanner – Foto-Methode (funktioniert auf jedem iPhone) ── */
const scanInput = document.createElement('input');
scanInput.type = 'file';
scanInput.accept = 'image/*';
scanInput.capture = 'environment';
scanInput.style.display = 'none';
document.body.appendChild(scanInput);

document.getElementById('scan-btn').addEventListener('click', () => scanInput.click());

scanInput.addEventListener('change', async () => {
  const file = scanInput.files[0];
  if (!file) return;
  scanInput.value = '';

  document.getElementById('scan-hint').textContent = 'Barcode wird erkannt …';
  document.getElementById('scanner-overlay').classList.add('active');

  try {
    await loadZXing();
    const img = new Image();
    img.src = URL.createObjectURL(file);
    await new Promise(r => img.onload = r);

    const reader = new ZXingBrowser.BrowserMultiFormatReader();
    const result = await reader.decodeFromImageElement(img);
    URL.revokeObjectURL(img.src);

    document.getElementById('scanner-overlay').classList.remove('active');
    document.getElementById('q').value = result.getText();
    render();
  } catch(e) {
    document.getElementById('scanner-overlay').classList.remove('active');
    alert('Kein Barcode erkannt. Bitte nochmal versuchen.');
  }
});

document.getElementById('scan-close').addEventListener('click', () =>
  document.getElementById('scanner-overlay').classList.remove('active'));

/* ── Detail schließen ── */
document.getElementById('detail-close').addEventListener('click', () =>
  document.getElementById('detail-overlay').classList.remove('active'));
document.getElementById('detail-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('detail-overlay'))
    document.getElementById('detail-overlay').classList.remove('active');
});

/* ── Events ── */
document.getElementById('q').addEventListener('input', render);
document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeGroup = chip.dataset.group;
  render();
});

load();
</script>
</body>
</html>
