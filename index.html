<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lagerverwaltung FB300</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1d1d1f; }

    header { background: #1c3f6e; color: #fff; padding: 14px 16px 10px; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 6px rgba(0,0,0,.25); }
    header h1 { font-size: 17px; font-weight: 700; }
    #updated { font-size: 11px; opacity: .65; margin-top: 2px; }

    .search-bar { background: #fff; padding: 10px 12px; position: sticky; top: 54px; z-index: 199; border-bottom: 1px solid #dde1e7; display: flex; gap: 8px; align-items: center; }
    .search-wrap { flex: 1; position: relative; display: flex; align-items: center; }
    .search-wrap input { width: 100%; padding: 9px 36px 9px 14px; border: 1.5px solid #c5cad3; border-radius: 10px; font-size: 16px; outline: none; background: #f7f8fa; }
    .search-wrap input:focus { border-color: #1c3f6e; background: #fff; }
    #clear-btn { position: absolute; right: 10px; background: none; border: none; font-size: 18px; color: #aaa; cursor: pointer; display: none; line-height: 1; padding: 2px; }
    #clear-btn.visible { display: block; }
    #scan-btn { flex-shrink: 0; width: 42px; height: 42px; background: #1c3f6e; color: #fff; border: none; border-radius: 10px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    #scan-status { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    #scan-status.active { display: flex; }
    #scan-status p { color: #fff; font-size: 16px; }
    #scan-cancel { padding: 10px 28px; background: #fff; color: #1c3f6e; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }

    #detail-overlay { display: none; position: fixed; inset: 0; z-index: 998; background: rgba(0,0,0,0.5); align-items: flex-end; }
    #detail-overlay.active { display: flex; }
    #detail-box { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding: 20px 16px 40px; max-height: 85vh; overflow-y: auto; }
    #detail-close { float: right; background: #eee; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; line-height: 30px; text-align: center; }
    #detail-title { font-size: 18px; font-weight: 700; margin: 8px 0 16px; line-height: 1.3; clear: both; }
    .detail-bestand { font-size: 28px; font-weight: 700; text-align: center; padding: 12px 0 20px; }
    .detail-bestand.ok { color: #1e8c45; }
    .detail-bestand.low { color: #c0392b; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #888; }
    .detail-value { font-weight: 500; text-align: right; max-width: 65%; word-break: break-all; }

    .chips { display: flex; gap: 7px; padding: 8px 12px; overflow-x: auto; background: #fff; border-bottom: 1px solid #dde1e7; -webkit-overflow-scrolling: touch; }
    .chips::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; padding: 5px 13px; border-radius: 20px; border: 1.5px solid #c5cad3; background: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .chip.active { background: #1c3f6e; color: #fff; border-color: #1c3f6e; }

    #info { padding: 7px 14px; font-size: 12px; color: #6e7480; }
    #results { padding: 4px 12px 80px; }

    .card { background: #fff; border-radius: 13px; padding: 13px 14px; margin-bottom: 9px; box-shadow: 0 1px 4px rgba(0,0,0,.07); cursor: pointer; }
    .card:active { background: #f5f7fb; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .art-nr { font-size: 12px; color: #8a909c; font-family: monospace; }
    .art-name { font-size: 15px; font-weight: 600; margin-top: 2px; line-height: 1.3; }
    .bestand { font-size: 16px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .bestand.ok { color: #1e8c45; }
    .bestand.low { color: #c0392b; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: #eef1f6; color: #4a5268; }
    .tag.ort { background: #e4f4e8; color: #256535; }
    .tag.vk  { background: #eef6ff; color: #1c3f6e; }
    .tag.ean { background: #fdf3e3; color: #7a5200; font-family: monospace; font-size: 10px; }

    .hint { text-align: center; padding: 48px 20px; color: #8a909c; font-size: 15px; }
    .hint .icon { font-size: 36px; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <h1>📦 Lagerverwaltung FB300</h1>
  <div id="updated">Lade Daten …</div>
</header>

<div class="search-bar">
  <div class="search-wrap">
    <input type="search" id="q" placeholder="Artikel, Art.-Nr., EAN …"
           autocomplete="off" autocorrect="off" autocapitalize="off">
    <button id="clear-btn" title="Suche löschen">✕</button>
  </div>
  <button id="scan-btn">📷</button>
</div>

<div class="chips" id="chips">
  <button class="chip active" data-group="">Alle</button>
</div>

<div id="info"></div>
<div id="results">
  <div class="hint"><span class="icon">⏳</span>Lagerdaten werden geladen …</div>
</div>

<div id="scan-status">
  <p id="scan-msg">Barcode wird erkannt …</p>
  <button id="scan-cancel">Abbrechen</button>
</div>

<div id="detail-overlay">
  <div id="detail-box">
    <button id="detail-close">✕</button>
    <div id="detail-title"></div>
    <div id="detail-content"></div>
  </div>
</div>

<script>
var CACHE_KEY = 'lager_data';
var CACHE_TS  = 'lager_ts';

function esc(s) {
  return (s == null ? '' : String(s))
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtPreis(s) {
  var n = parseFloat((s || '').replace(',', '.'));
  return isNaN(n) ? (s || '') : n.toLocaleString('de-DE', {minimumFractionDigits:2, maximumFractionDigits:2});
}

var data        = [];
var activeGroup = '';

// Cache: sofort aus localStorage laden, dann im Hintergrund aktualisieren
function initData() {
  var cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try {
      var parsed = JSON.parse(cached);
      applyData(parsed, true);
    } catch(e) {}
  }
  fetchFresh();
}

function fetchFresh() {
  fetch('./lager.json')
    .then(function(r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
    .then(function(raw) {
      localStorage.setItem(CACHE_KEY, JSON.stringify(raw));
      localStorage.setItem(CACHE_TS, Date.now());
      applyData(raw, false);
    })
    .catch(function(e) {
      if (!data.length) {
        document.getElementById('results').innerHTML =
          '<div class="hint" style="color:#c0392b"><span class="icon">⚠️</span>Fehler: ' + e + '</div>';
      }
    });
}

function applyData(raw, fromCache) {
  data = raw.filter(function(d) {
    return d.artnr && d.artnr !== 'Art.-Nr.' && d.nr !== '#';
  });

  // Chips neu aufbauen (nur beim ersten Mal)
  var bar = document.getElementById('chips');
  if (bar.children.length <= 1) {
    var groups = [];
    data.forEach(function(d) {
      if (d.warengruppe && groups.indexOf(d.warengruppe) === -1) groups.push(d.warengruppe);
    });
    groups.sort().forEach(function(g) {
      var btn = document.createElement('button');
      btn.className = 'chip'; btn.dataset.group = g; btn.textContent = g;
      bar.appendChild(btn);
    });
  }

  var ts = localStorage.getItem(CACHE_TS);
  var tsText = ts ? new Date(parseInt(ts)).toLocaleString('de-DE', {dateStyle:'short', timeStyle:'short'}) : '';
  document.getElementById('updated').textContent =
    (fromCache ? 'Cache: ' : 'Stand: ') + tsText;

  render();
}

function render() {
  var q    = document.getElementById('q').value.trim().toLowerCase();
  var keys = ['artnr','artikel','ean','lagerort','attribut','warengruppe','nr'];

  document.getElementById('clear-btn').classList.toggle('visible', q.length > 0);

  var filtered = data.filter(function(d) {
    if (activeGroup && d.warengruppe !== activeGroup) return false;
    if (!q) return true;
    return keys.some(function(k) {
      return (d[k] || '').toLowerCase().indexOf(q) !== -1;
    });
  });

  document.getElementById('info').textContent =
    filtered.length + ' Artikel' + (q ? ' für „' + q + '"' : '');

  var box = document.getElementById('results');
  if (!filtered.length) {
    box.innerHTML = '<div class="hint"><span class="icon">🔍</span>Keine Artikel gefunden.</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var d   = filtered[i];
    var idx = data.indexOf(d);
    var b   = parseFloat((d.bestand || '0').replace(',', '.')) || 0;
    var cls = b <= 0 ? 'low' : 'ok';
    html += '<div class="card" onclick="showDetail(' + idx + ')">';
    html += '<div class="card-top">';
    html += '<div><div class="art-nr">' + esc(d.artnr) + '</div>';
    html += '<div class="art-name">' + esc(d.artikel) + '</div></div>';
    html += '<div class="bestand ' + cls + '">' + esc(d.bestand) + '&thinsp;' + esc(d.einheit) + '</div>';
    html += '</div><div class="tags">';
    if (d.lagerort)    html += '<span class="tag ort">📍 ' + esc(d.lagerort) + '</span>';
    if (d.warengruppe) html += '<span class="tag">' + esc(d.warengruppe) + '</span>';
    if (d.vk)          html += '<span class="tag vk">VK ' + esc(d.vk) + ' €</span>';
    if (d.ean)         html += '<span class="tag ean">EAN ' + esc(d.ean) + '</span>';
    html += '</div></div>';
  }
  box.innerHTML = html;
}

function showDetail(idx) {
  var d = data[idx];
  if (!d) return;
  var b   = parseFloat((d.bestand || '0').replace(',', '.')) || 0;
  var cls = b <= 0 ? 'low' : 'ok';

  document.getElementById('detail-title').textContent = d.artikel || '';

  function r(label, val) {
    if (!val) return '';
    return '<div class="detail-row"><span class="detail-label">' + label +
           '</span><span class="detail-value">' + esc(val) + '</span></div>';
  }

  var c = '<div class="detail-bestand ' + cls + '">' + esc(d.bestand) + ' ' + esc(d.einheit) + '</div>';
  c += r('Art.-Nr.',    d.artnr);
  c += r('EAN',         d.ean);
  c += r('Lagerort',    d.lagerort);
  c += r('Warengruppe', d.warengruppe);
  c += r('Attribut',    d.attribut);
  c += r('VK-Preis',    d.vk ? fmtPreis(d.vk) + ' €' : '');
  c += r('EK-Preis',    d.ek ? fmtPreis(d.ek) + ' €' : '');
  c += r('Nr.',         d.nr);

  document.getElementById('detail-content').innerHTML = c;
  document.getElementById('detail-overlay').classList.add('active');
}

// ── Clear-Button ─────────────────────────────────────────
document.getElementById('clear-btn').addEventListener('click', function() {
  document.getElementById('q').value = '';
  this.classList.remove('visible');
  render();
});

// ── Detail ───────────────────────────────────────────────
document.getElementById('detail-close').addEventListener('click', function() {
  document.getElementById('detail-overlay').classList.remove('active');
});
document.getElementById('detail-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('active');
});

// ── Filter-Chips ─────────────────────────────────────────
document.getElementById('chips').addEventListener('click', function(e) {
  var chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
  chip.classList.add('active');
  activeGroup = chip.dataset.group;
  render();
});

// ── Suche ────────────────────────────────────────────────
document.getElementById('q').addEventListener('input', render);

// ── Barcode Scanner ──────────────────────────────────────
var scanInput = document.createElement('input');
scanInput.type = 'file';
scanInput.accept = 'image/*';
scanInput.capture = 'environment';
scanInput.style.display = 'none';
document.body.appendChild(scanInput);

document.getElementById('scan-btn').addEventListener('click', function() { scanInput.click(); });
document.getElementById('scan-cancel').addEventListener('click', function() {
  document.getElementById('scan-status').classList.remove('active');
});

scanInput.addEventListener('change', function() {
  var file = scanInput.files[0];
  if (!file) return;
  scanInput.value = '';
  document.getElementById('scan-msg').textContent = 'Barcode wird erkannt …';
  document.getElementById('scan-status').classList.add('active');

  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.4/umd/index.min.js';
  s.onload = function() {
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      new ZXingBrowser.BrowserMultiFormatReader()
        .decodeFromImageElement(img)
        .then(function(result) {
          URL.revokeObjectURL(url);
          document.getElementById('scan-status').classList.remove('active');
          document.getElementById('q').value = result.getText();
          render();
        })
        .catch(function() {
          URL.revokeObjectURL(url);
          document.getElementById('scan-status').classList.remove('active');
          alert('Kein Barcode erkannt – bitte nochmal versuchen.');
        });
    };
    img.src = url;
  };
  if (window.ZXingBrowser) { s.onload(); } else { document.head.appendChild(s); }
});

// ── Start ────────────────────────────────────────────────
initData();
</script>
</body>
</html>
